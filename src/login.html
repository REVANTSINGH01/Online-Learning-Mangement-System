<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibrant University LMS</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4A90E2;
            --secondary-color: #F5A623;
            --accent-color: #E94E77;
            --background-color: #F3F8FB;
            --text-color: #333333;
            --light-color: #E4E9F2;
        }

        body {
            background-color: var(--background-color);
            font-family: 'Arial', sans-serif;
            overflow-x: hidden;
        }

        /* Sidebar Styles */
        .sidebar {
            height: 100vh;
            background: var(--primary-color);
            color: white;
            width: 250px;
            position: fixed;
            top: 0;
            left: -250px; /* Initially hidden */
            transition: all 0.3s ease;
            padding-top: 30px;
            box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
            z-index: 1000; /* Ensure it is above other content */
        }

        .sidebar.active {
            left: 0; /* Show sidebar when active */
        }

        .sidebar h3 {
            font-size: 24px;
            margin-bottom: 40px;
            text-align: center;
            color: white;
        }

        .sidebar .nav-link {
            color: white;
            font-size: 18px;
            padding: 10px;
            text-transform: uppercase;
        }

        .sidebar .nav-link:hover {
            background-color: var(--accent-color);
            color: white;
            border-radius: 5px;
        }

        .sidebar .nav-link.active {
            background-color: var(--secondary-color);
        }

        /* Sidebar toggle button */
        .toggle-btn {
            position: fixed;
            top: 50%;
            left: 0;
            transform: translateY(-50%) rotate(180deg); /* Center vertically and rotate */
            width: 50px;
            height: 50px;
            background: var(--accent-color);
            border: none;
            color: white; /* Change text color */
            cursor: pointer;
            border-radius: 25px 0 0 25px; /* Create a semicircle */
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s, transform 0.3s; /* Add transition for rotation */
            z-index: 1001; /* Ensure it is above other content */
            box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
        }

        .toggle-btn:hover {
            background: var(--secondary-color); /* Change color on hover */
        }

        .toggle-btn:after {
            content: '>';
            font-size: 24px;
            margin-left: 5px; /* Space between icon and button edge */
        }

        /* Main content */
        .main-content {
            margin-left: 0; /* Start with no margin */
            padding: 20px;
            transition: margin-left 0.3s ease;
        }

        .main-content.collapsed {
            margin-left: 250px; /* Margin when sidebar is open */
        }

        .calendar,
        .timeline {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .calendar .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            text-align: center;
        }

        .calendar .day {
            padding: 10px;
            border-radius: 4px;
            background: var(--light-color);
        }

        .calendar .day.today {
            background: var(--secondary-color);
            color : white;
        }

        .timeline h3 {
            color: var(--secondary-color);
            margin-bottom: 15px;
        }

        .timeline .timeline-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .timeline .filter-box {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        .timeline .activity-list {
            margin-top: 20px;
            border-top: 1px solid #eaeaea;
            padding-top: 15px;
        }

        .timeline .activity-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eaeaea;
        }

        .timeline .activity-item:last-child {
            border-bottom: none;
        }

        .timeline .activity-item p {
            margin: 0;
        }

        .timeline .btn {
            font-size: 0.9rem;
        }

        .dashboard-header {
            margin-bottom: 30px;
            padding-right: 50px; /* Add padding to avoid overlap */
        }

        .dashboard-header h2 {
            font-size: 32px;
            color: var(--primary-color);
        }

        .dashboard-header p {
            font-size: 16px;
            color: var(--text-color);
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <h3>Vibrant University</h3>
        <ul class="nav flex-column">
            <li class="nav-item">
                <a class="nav-link active" href="#" id="dashboardLink">Dashboard</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#" id="calendarLink">Calendar</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#" id="assignmentsLink">Assignments</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#" id="coursesLink">Courses</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#" id="profileLink">Profile</a>
            </li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Sidebar Toggle Button -->
        <button class="toggle-btn" id="toggleBtn"></button>

        <div class="dashboard-header">
            <h2>Dashboard</h2>
            <p>Welcome to your university portal, where you can manage your assignments, calendar, and more.</p>
        </div>

        <div class="row">
            <!-- Calendar Section -->
            <div class="col-md-8 mb-4">
                <div class="calendar">
                    <div class="calendar-header">
                        <button class="btn btn-secondary btn-sm" onclick="prevMonth()">Previous</button>
                        <h4 id="monthYear">December 2024</h4>
                        <button class="btn btn-secondary btn-sm" onclick="nextMonth()">Next</button>
                    </div>
                    <div class="days" id="days">
                        <!-- Days will be dynamically populated here -->
                    </div>
                </div>
            </div>

            <!-- Timeline Section -->
            <div class="col-md-4">
                <div class="timeline">
                    <h3>Timeline</h3>
                    <div class="timeline-header">
                        <select class="form-select form-select-sm">
                            <option>Next 7 days</option>
                            <option>Next 14 days</option>
                        </select>
                        <button class="btn btn-sm btn-outline-secondary">Sort by dates</button>
                    </div>
                    <div class="filter-box">
                        <input type="text" class="form-control form-control-sm" placeholder="Search by activity type or name">
                    </div>
                    <div class="activity-list">
                        <!-- Placeholder for empty list -->
                        <div class="activity-item">
                            <p>No activities found.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const monthYear = document.getElementById('monthYear');
        const daysContainer = document.getElementById('days');
        const toggleBtn = document.getElementById('toggleBtn');
        const sidebar = document.querySelector('.sidebar');
        const mainContent = document.querySelector('.main-content');
        
        // Initialize the sidebar and main content for the first time
        let currentMonth = new Date().getMonth();
        let currentYear = new Date().getFullYear();

        // Sidebar toggle functionality
        toggleBtn.addEventListener('click', () => {
            sidebar.classList.toggle('active');
            mainContent.classList.toggle('collapsed');
            toggleBtn.style.transform = sidebar.classList.contains('active') ? 'translateY(-50%) rotate(0deg)' : 'translateY(-50%) rotate(180deg)'; // Rotate button based on sidebar state
        });

        // Function to switch between months
        function prevMonth() {
            if (currentMonth === 0) {
                currentMonth = 11;
                currentYear -= 1;
            } else {
                currentMonth -= 1;
            }
            updateCalendar();
        }

        function nextMonth() {
            if (currentMonth === 11) {
                currentMonth = 0;
                currentYear += 1;
            } else {
                currentMonth += 1;
            }
            updateCalendar();
        }

        function updateCalendar() {
            const months = [
                'January', 'February', 'March', 'April', 'May', 'June',
                'July', 'August', 'September', 'October', 'November', 'December'
            ];
            monthYear.textContent = `${months[currentMonth]} ${currentYear}`;

            // Clear previous days
            daysContainer.innerHTML = '';

            // Get the number of days in the current month
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

            // Get the starting day of the week for the current month
            const startDay = new Date(currentYear, currentMonth, 1).getDay();

            // Add empty days before the first day of the month
            for (let i = 0; i < startDay; i++) {
                const emptyDay = document.createElement('div');
                emptyDay.classList.add('day');
                daysContainer.appendChild(emptyDay);
            }

            // Add actual days of the month
            for (let i = 1; i <= daysInMonth; i++) {
                const dayElement = document.createElement('div');
                dayElement.classList.add('day');
                dayElement.textContent = i;

                // Mark today's date
                if (i === new Date().getDate() && currentMonth === new Date().getMonth() && currentYear === new Date().getFullYear()) {
                    dayElement.classList.add('today');
                }

                daysContainer.appendChild(dayElement);
            }
        }

        updateCalendar();

        // Sidebar Link Active State
        const links = document.querySelectorAll('.nav-link');
        links.forEach(link => {
            link.addEventListener('click', function () {
                links.forEach(l => l.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
